version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8910:8910"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/aiteamhub.db
      - WORKER_ENV=production
      - LOG_LEVEL=info
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
      # Generate a crypto key: python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # - AI_TEAM_HUB_CRYPTO_KEY=
    volumes:
      - aiteamhub_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import httpx; httpx.get('http://localhost:8910/api/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  aiteamhub_data:
