version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8910:8910"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/ai_team_hub.db
      - WORKER_ENV=production
      - LOG_LEVEL=info
    volumes:
      - api_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8910/api/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  api_data:
